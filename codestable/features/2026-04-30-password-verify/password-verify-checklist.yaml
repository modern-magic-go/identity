steps:
  - step: API 类型定义
    description: api.go 新增 VerifyInput/VerifyOutput/GetOrInitSubjectInput/GetOrInitSubjectOutput 四个 struct
    status: done
    exit_signal: go build ./... 编译通过

  - step: MockStore 实现
    description: internal/store/mock.go — 内存 IdentityStore 实现，持有 IDGenerator
    status: done
    exit_signal: MockStore 四方法 CRUD 行为正确（单测验证）

  - step: VerifyCredential 编排
    description: usecase/verify_credential.go — 查凭证→找 Verifier→比对→返回结果
    status: done
    exit_signal: 正确密码通过、错误密码拒绝、凭证未找到返回 CREDENTIAL_NOT_FOUND

  - step: GetOrInitializeSubjectID 编排
    description: usecase/get_or_init_subject.go — 查凭证→已有返回/新建 subject→绑凭证
    status: done
    exit_signal: 已有返回已有 ID（IsNewUser=false）、新凭证创建 subject（IsNewUser=true）

  - step: 测试覆盖
    description: MockStore CRUD 单测 + 两个 usecase 各 3 场景 + 端到端闭环测试
    status: done
    exit_signal: go test ./... 全部通过

checks:
  - id: C1
    description: VerifyCredential 正确密码返回 Success=true + SubjectID 非零
    status: passed

  - id: C2
    description: GetOrInitializeSubjectID 新标识返回 IsNewUser=true + SubjectID 非零
    status: passed

  - id: C3
    description: 同一标识再次 GetOrInitializeSubjectID 返回 IsNewUser=false + 相同 SubjectID
    status: passed

  - id: C4
    description: 创建 subject 并绑定密码后校验正确密码——Success=true + SubjectID 匹配
    status: passed

  - id: C5
    description: VerifyCredential 凭证未找到——Success=false + ErrorCode=CREDENTIAL_NOT_FOUND
    status: passed

  - id: C6
    description: VerifyCredential 密码错误——Success=false + ErrorCode=INVALID_CREDENTIAL
    status: passed

  - id: C7
    description: BindCredential 重复 Realm+Type+Identifier 返回 ErrDuplicateCredential
    status: passed

  - id: C8
    description: BindCredential 的 SubjectID 不存在返回 ErrSubjectNotFound
    status: passed

  - id: REV1
    description: grep type IdentityCore struct zero match
    status: passed

  - id: REV2
    description: grep func BindCredential\|func ListCredentials zero match（仅 store 接口声明和 mock 方法）
    status: passed

  - id: REV3
    description: grep TOTP 仅 model.go TypeTOTP 常量
    status: passed

  - id: REV4
    description: 无 MySQL/Redis 连接代码
    status: passed
    exit_signal: go test ./... 全部通过

